syntax = "proto3";
package starfly.identity.agent.plugin.v1;
option go_package = "pkg/identity/agent/plugin";

service AgentIdentityPlugin {
  rpc IssueAgentIdentity(IssueAgentIdentityRequest) returns (IssueAgentIdentityResponse);
  rpc RevokeIdentity(RevokeIdentityRequest) returns (RevokeIdentityResponse);
}

message IssueAgentIdentityRequest {
  string agent_name = 1;
  string platform = 2;
  repeated string capabilities = 3;
  string on_behalf_of = 4;
  string max_blast_radius = 5;
  int32 delegation_depth = 6;
  map<string, string> metadata = 7;
}

message IssueAgentIdentityResponse {
  string workload_id = 1;
  string spiffe_id = 2;
  string token = 3;
  int64 expires_at_unix = 4;
}

message RevokeIdentityRequest {
  string identity_id = 1;
}

message RevokeIdentityResponse {}

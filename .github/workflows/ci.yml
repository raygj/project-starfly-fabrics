name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  starfly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache-dependency-path: go.sum
      - name: Build Starfly
        run: make build-dev
      - name: Unit tests
        run: make test

  terraform-provider:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache-dependency-path: terraform-provider/go.sum
      - name: Build provider
        working-directory: terraform-provider
        run: make build

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: docs-site/package-lock.json
      - name: Install docs-site deps
        working-directory: docs-site
        run: npm ci
      - name: Build Starlight site
        working-directory: docs-site
        run: npm run build

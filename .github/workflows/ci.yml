name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  starfly:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache-dependency-path: go.sum
      - name: Build Starfly
        run: make build-dev
      - name: Unit tests
        run: make test

  terraform-provider:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache-dependency-path: terraform-provider/go.sum
      - name: Build provider
        working-directory: terraform-provider
        run: make build

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: docs-site/package-lock.json
      - name: Install docs-site deps
        working-directory: docs-site
        run: npm ci
      - name: Build Starlight site
        working-directory: docs-site
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: [starfly, terraform-provider, docs]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs-site/package-lock.json
      - name: Install dependencies
        run: npm ci && npm ci --prefix docs-site
      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run deploy
